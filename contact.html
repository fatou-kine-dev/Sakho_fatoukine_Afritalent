        <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold text-danger" href="index.html">AfriTalent</a>
                
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                </div>

        </nav>
    </header>

    <main class="py-5">
        <div class="container">
            <h1 class="text-center fw-bold mb-5">Contactez-nous</h1>
            
            <div class="row g-5">
                <!-- Colonne Gauche : Formulaire -->
                <div class="col-lg-6">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Nom</label>
                            <input type="text" class="form-control" placeholder="Votre nom">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Prenom</label>
                            <input type="text" class="form-control" placeholder="Votre prénom">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="nom@exemple.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sujet</label>
                            <select class="form-select">
                                <option>Support</option>
                                <option>Partenariat</option>
                                <option>Autre</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="5" placeholder="Votre message"></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Envoyer le message</button>
                    </form>
                </div>
                
                <!-- Colonne Droite : Coordonnées et Carte -->
                <div class="col-lg-6">
                    <h3 class="fw-bold mb-4">Nos coordonnées</h3>
                    <p><strong>Email :</strong> contact@afritalent.com</p>
                    <p><strong>Téléphone :</strong> +221 77 695 94 28</p>
                    <p><strong>Adresse :</strong> Dakar, Sénégal</p>

        style="border:0;"

</div>
</div>
