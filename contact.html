<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous | AfriTalent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="index.html">AFRITALENT</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="freelances.html">Freelances</a></li>
                    <li class="nav-item"><a class="nav-link" href="tarifs.html">Tarifs</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">À propos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="py-5 text-center bg-white border-bottom">
        <div class="container">
            <h1 class="fw-bold animate-text">Contactez-nous</h1>
            <p class="text-muted animate-text">Une question ? Un projet ? Notre équipe vous répond sous 24h.</p>
        </div>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0 shadow-sm p-4 animate-text">
                    <form id="contactForm">
                        <div class="mb-3">
                            <label for="nom" class="form-label fw-bold">Nom complet</label>
                            <input type="text" class="form-control" id="nom" placeholder="Votre nom" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Adresse Email</label>
                            <input type="email" class="form-control" id="email" placeholder="nom@exemple.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="sujet" class="form-label fw-bold">Sujet</label>
                            <select class="form-select" id="sujet">
                                <option value="recrutement">Recrutement de freelance</option>
                                <option value="devenir">Devenir freelance</option>
                                <option value="autre">Autre demande</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label fw-bold">Votre message</label>
                            <textarea class="form-control" id="message" rows="5" placeholder="Comment pouvons-nous vous aider ?" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold shadow-sm">Envoyer le message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 small">© 2026 AfriTalent - Projet réalisé par Fatou Kine Sakho (ISI)</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
